<!DOCTYPE html>
<html lang="en">
  <head>
    <title>FoodMart - Register</title>
    <meta charset="utf-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="format-detection" content="telephone=no">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="author" content="">
    <meta name="keywords" content="">
    <meta name="description" content="">

    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/swiper@9/swiper-bundle.min.css">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha3/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-KK94CHFLLe+nY2dmCWGMq91rCGa5gtU4mk92HdvYe+M/SXH301p5ILy+dN9+nJOZ" crossorigin="anonymous">
    <link rel="stylesheet" type="text/css" href="css/vendor.css">
    <link rel="stylesheet" type="text/css" href="style.css">

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;700&family=Open+Sans:ital,wght@0,400;0,700;1,400;1,700&display=swap" rel="stylesheet">

  </head>
  <body style="background-image: url('images/background-pattern.jpg'); background-repeat: no-repeat; background-size: cover; min-height: 100vh; display: flex; align-items: center; justify-content: center;">

    <div class="preloader-wrapper">
      <div class="preloader">
      </div>
    </div>

    <!-- Register Form Section -->
    <section class="register-section py-5 w-100">
      <div class="container">
        <div class="row justify-content-center">
          <div class="col-md-8 col-lg-5">
            <div class="card border-0 shadow-lg rounded-4 p-4">
              <div class="card-body">
                <div class="text-center mb-4">
                  <img src="images/logo.png" alt="logo" class="img-fluid mb-3" style="max-width: 150px;">
                  <h3 class="card-title fw-bold">Create Account</h3>
                  <p class="text-muted">Join our community today!</p>
                </div>
                <form id="register-form">
                  <div class="row">
                    <div class="col-md-6 mb-3">
                      <label for="firstName" class="form-label fw-semibold">First Name</label>
                      <input type="text" class="form-control rounded-3 border-light-subtle" id="firstName" placeholder="First Name" required>
                    </div>
                    <div class="col-md-6 mb-3">
                      <label for="lastName" class="form-label fw-semibold">Last Name</label>
                      <input type="text" class="form-control rounded-3 border-light-subtle" id="lastName" placeholder="Last Name" required>
                    </div>
                  </div>
                  <div class="mb-3">
                    <label for="email" class="form-label fw-semibold">Email address</label>
                    <input type="email" class="form-control rounded-3 border-light-subtle" id="email" placeholder="name@example.com" required>
                  </div>
                  <div class="mb-3">
                    <label for="password" class="form-label fw-semibold">Password</label>
                    <input type="password" class="form-control rounded-3 border-light-subtle" id="password" placeholder="Min. 8 characters" required>
                  </div>
                  <div class="mb-3">
                    <label for="confirmPassword" class="form-label fw-semibold">Confirm Password</label>
                    <input type="password" class="form-control rounded-3 border-light-subtle" id="confirmPassword" placeholder="Repeat password" required>
                  </div>
                  <div class="mb-3">
                    <div class="form-check">
                      <input type="checkbox" class="form-check-input" id="terms" required>
                      <label class="form-check-label text-muted small" for="terms">I agree to the <a href="#" class="text-primary">Terms of Service</a> and <a href="#" class="text-primary">Privacy Policy</a></label>
                    </div>
                  </div>
                  <div class="d-grid gap-2">
                    <button type="submit" class="btn btn-primary btn-lg rounded-3">Register</button>
                  </div>
                </form>
                <div class="text-center mt-4">
                  <p class="mb-0 text-muted" hidden>Already have an account? <a href="index.html" class="text-primary fw-bold text-decoration-none">Login</a></p>
                </div>
              </div>
            </div>
          </div>
        </div>
      </div>
    </section>

    <script src="js/jquery-1.11.0.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/swiper@9/swiper-bundle.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha3/dist/js/bootstrap.bundle.min.js" integrity="sha384-ENjdO4Dr2bkBIFxQpeoTz1HIcje39Wm4jDKdf19U8gI4ddQ3GYNS7NTKfAdVQSZe" crossorigin="anonymous"></script>
    <script src="js/plugins.js"></script>
    <script src="js/script.js"></script>
    <script src="js/scripts/UserAuthhentication.js"></script>
  </body>
</html>
