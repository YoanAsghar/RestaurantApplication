<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Checkout</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha3/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body {
            background-color: #f8f9fa;
        }
        .checkout-container {
            max-width: 960px;
            margin: 40px auto;
        }
        .payment-form {
            background-color: #ffffff;
            padding: 30px;
            border-radius: 8px;
            box-shadow: 0 4px 8px rgba(0,0,0,0.05);
        }
        .payment-form .card-header {
            background-color: #f8f9fa;
            border-bottom: 1px solid #dee2e6;
            font-weight: 500;
            padding: 1rem 1.25rem;
            margin-bottom: 0;
        }
        .form-control:focus {
            box-shadow: none;
            border-color: #0d6efd;
        }
        .card-icon {
            font-size: 1.5rem;
            margin-right: 10px;
        }
        .table-summary {
            margin-top: 30px;
        }
        .section-title {
            font-size: 1.5rem;
            font-weight: 500;
            margin-bottom: 1.5rem;
            border-bottom: 1px solid #dee2e6;
            padding-bottom: 10px;
        }
    </style>
</head>
<body>

<div class="checkout-container">
    <div class="text-center mb-5">
        <h2>Checkout</h2>
        <p class="lead">Please complete your order by providing the following information.</p>
    </div>

    <div class="row g-5">
        <div class="col-md-7">
            <h4 class="section-title">Billing Information</h4>
            <form>
                <div class="row g-3">
                    <div class="col-sm-6">
                        <label for="firstName" class="form-label">First name</label>
                        <input type="text" class="form-control" id="firstName" placeholder="John" required>
                    </div>
                    <div class="col-sm-6">
                        <label for="lastName" class="form-label">Last name</label>
                        <input type="text" class="form-control" id="lastName" placeholder="Doe" required>
                    </div>
                    <div class="col-12">
                        <label for="email" class="form-label">Email</label>
                        <input type="email" class="form-control" id="email" placeholder="you@example.com">
                    </div>
                    <div class="col-12">
                        <label for="address" class="form-label">Address</label>
                        <input type="text" class="form-control" id="address" placeholder="1234 Main St" required>
                    </div>
                </div>
            </form>

            <div class="table-summary">
                <h4 class="section-title">Order Summary</h4>
                <table class="table table-striped">
                    <thead class="table-light">
                        <tr>
                            <th scope="col">Product</th>
                            <th scope="col">Description</th>
                            <th scope="col" class="text-center">Quantity</th>
                            <th scope="col" class="text-end">Price</th>
                        </tr>
                    </thead>
                    <tbody id="user_products">
                      <tr id="table_element">
                        <td></td>
                        <td></td>
                        <td></td>
                        <td></td>
                      </tr>
                    </tbody>
                </table>
            </div>

        </div>

        <div class="col-md-5">
            <div class="payment-form">
                <h4 class="d-flex justify-content-between align-items-center mb-4">
                    <span class="text-primary">Payment Details</span>
                </h4>
                <div class="card-header mb-3">
                    <span><i class="bi bi-credit-card-fill card-icon"></i>Credit Card</span>
                </div>
                <form id="checkout_form">
                    <div class="row gy-3">
                        <div class="col-12">
                            <label for="cc-name" class="form-label">Name on card</label>
                            <input type="text" class="form-control" id="cc-name" placeholder="John M. Doe" required>
                            <small class="text-muted">Full name as displayed on card</small>
                        </div>
                        <div class="col-12">
                            <label for="cc-number" class="form-label">Credit card number</label>
                            <input type="text" class="form-control" id="cc-number" placeholder="XXXX-XXXX-XXXX-XXXX" required>
                        </div>
                        <div class="col-md-6">
                            <label for="cc-expiration" class="form-label">Expiration</label>
                            <input type="text" class="form-control" id="cc-expiration" placeholder="MM/YY" required>
                        </div>
                        <div class="col-md-6">
                            <label for="cc-cvv" class="form-label">CVV</label>
                            <input type="text" class="form-control" id="cc-cvv" placeholder="123" required>
                        </div>
                    </div>
                    <hr class="my-4">
                    <button id="checkout-button" class="w-100 btn btn-primary btn-lg" type="submit">Pay Now</button>
                </form>
            </div>
        </div>
    </div>
</div>

<script src="./js/scripts/checkout.js"></script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css"></script>
</body>
</html>
